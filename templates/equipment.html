{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Available Lab Equipment</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Equipment Name</th>
                <th>Category</th>
                <th>Total Quantity</th>
                <th>Available Quantity</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

            {% for item in equipment %}

            <tr>
                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>{{ item[3] }}</td>
                <td>{{ item[4] }}</td>
                <td>{{ item[5] }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

    <a href="/student" class="btn btn-secondary">
        Back to Dashboard
    </a>

</div>

{% endblock %}
