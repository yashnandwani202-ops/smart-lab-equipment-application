{% extends "base.html" %}

{% block content %}

<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h2>Add User</h2>
                        <p>Create a new student, faculty, or admin account</p>
                    </div>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control auth-input" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control auth-input" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="text" name="password" class="form-control auth-input" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Role</label>
                                <select name="role" class="form-select auth-input" required>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Status</label>
                                <select name="status" class="form-select auth-input" required>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success auth-btn flex-fill">
                                Add User
                            </button>

                            <a href="/admin-users" class="btn btn-outline-secondary auth-btn flex-fill">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
