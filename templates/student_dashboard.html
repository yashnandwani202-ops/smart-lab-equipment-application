{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">Student Dashboard</h2>

    <div class="alert alert-success">
        Welcome, Student! You have successfully logged in.
    </div>

    <div class="row">

        <!-- View Equipment -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>View Equipment</h5>
                    <p>Browse available lab equipment.</p>
                    <a href="/equipment" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>

        <!-- My Bookings -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>My Bookings</h5>
                    <p>Check your equipment booking status.</p>
                    <a href="/my-bookings" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Profile</h5>
                    <p>View and update your profile details.</p>
                    <a href="#" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>

    </div>
</div>

{% endblock %}
