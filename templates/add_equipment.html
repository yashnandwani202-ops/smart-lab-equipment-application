{% extends "base.html" %}

{% block content %}

<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h2>Add Equipment</h2>
                        <p>Add a new item to the lab inventory</p>
                    </div>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Equipment Name</label>
                            <input type="text" name="equipment_name" class="form-control auth-input" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" name="category" class="form-control auth-input" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Total Quantity</label>
                                <input type="number" name="quantity" class="form-control auth-input" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Available Quantity</label>
                                <input type="number" name="available_quantity" class="form-control auth-input" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select auth-input">
                                <option value="Available">Available</option>
                                <option value="Unavailable">Unavailable</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success auth-btn flex-fill">
                                Add Equipment
                            </button>

                            <a href="/admin-equipment" class="btn btn-outline-secondary auth-btn flex-fill">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
