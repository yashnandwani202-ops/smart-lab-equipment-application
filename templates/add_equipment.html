{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Add New Equipment</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Equipment Name</label>
            <input type="text" name="equipment_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Total Quantity</label>
            <input type="number" name="quantity" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Available Quantity</label>
            <input type="number" name="available_quantity" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="Available">Available</option>
                <option value="Unavailable">Unavailable</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Add Equipment
        </button>

        <a href="/admin-equipment" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
