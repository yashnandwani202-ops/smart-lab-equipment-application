{% extends "base.html" %}

{% block content %}

<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h2>Welcome Back</h2>
                        <p>Login to continue to LabNexa</p>
                    </div>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            <div class="alert alert-danger">
                                {{ messages[0] }}
                            </div>
                        {% endif %}
                    {% endwith %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control auth-input"
                                   name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control auth-input"
                                   name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 auth-btn">
                            Sign In
                        </button>

                        <div class="text-center mt-4">
                            <span class="text-muted">Don't have an account?</span>
                            <a href="/register" class="fw-bold">Create account</a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
